<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navbar with Side Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --blue: #3b5bdb;
    --blue-dark: #2f4ac7;
    --blue-light: #eef2ff;
    --text: #1c1e21;
    --subtext: #65676b;
    --bg: #f0f2f5;
    --white: #ffffff;
    --badge: #e41e3f;
    --shadow: 0 2px 12px rgba(0,0,0,0.13);
    --radius: 10px;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
  }

  /* TOP NAVBAR */
  .navbar {
    background: var(--blue);
    height: 56px;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    box-shadow: var(--shadow);
    position: relative;
    z-index: 100;
  }

  .navbar-brand {
    font-size: 1.25rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.3px;
    flex: 0 0 auto;
  }

  .navbar-search {
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.18);
    border-radius: 22px;
    padding: 0 14px;
    height: 36px;
    flex: 1;
    max-width: 260px;
    gap: 8px;
    transition: background 0.2s;
  }
  .navbar-search:focus-within { background: rgba(255,255,255,0.28); }
  .navbar-search input {
    background: none;
    border: none;
    outline: none;
    color: #fff;
    font-family: inherit;
    font-size: 0.9rem;
    width: 100%;
  }
  .navbar-search input::placeholder { color: rgba(255,255,255,0.7); }
  .navbar-search svg { color: rgba(255,255,255,0.8); flex-shrink: 0; }

  .navbar-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: auto;
  }

  .nav-icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    transition: background 0.18s, transform 0.15s;
    position: relative;
  }
  .nav-icon-btn:hover { background: rgba(255,255,255,0.3); transform: scale(1.08); }

  /* MENU TOGGLE */
  .menu-toggle {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    transition: background 0.18s;
  }
  .menu-toggle:hover { background: rgba(255,255,255,0.3); }

  /* LAYOUT */
  .layout {
    display: flex;
    height: calc(100vh - 56px);
  }

  /* SIDE PANEL */
  .side-panel {
    width: 260px;
    background: var(--white);
    box-shadow: var(--shadow);
    transform: translateX(0);
    transition: transform 0.28s cubic-bezier(.4,0,.2,1), width 0.28s;
    flex-shrink: 0;
    overflow-y: auto;
    overflow-x: hidden;
    padding-bottom: 20px;
  }
  .side-panel.hidden {
    transform: translateX(-100%);
    width: 0;
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 10px;
    background: var(--blue);
    color: #fff;
  }
  .panel-header h2 {
    font-size: 1rem;
    font-weight: 700;
  }
  .panel-close {
    background: none;
    border: none;
    color: #fff;
    cursor: pointer;
    padding: 4px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .panel-close:hover { background: rgba(255,255,255,0.2); }

  .panel-section-label {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--subtext);
    letter-spacing: 0.6px;
    text-transform: uppercase;
    padding: 14px 18px 4px;
  }

  .panel-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 18px;
    border-radius: 8px;
    margin: 2px 8px;
    cursor: pointer;
    transition: background 0.15s;
    text-decoration: none;
  }
  .panel-item:hover { background: var(--blue-light); }
  .panel-item.active { background: var(--blue-light); }

  .panel-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--blue-light);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--blue);
    flex-shrink: 0;
  }

  .panel-item-name {
    font-size: 0.92rem;
    font-weight: 600;
    color: var(--text);
    flex: 1;
  }

  .badge {
    background: var(--badge);
    color: #fff;
    font-size: 0.72rem;
    font-weight: 700;
    border-radius: 10px;
    padding: 1px 7px;
    min-width: 20px;
    text-align: center;
  }

  .divider {
    height: 1px;
    background: #e4e6eb;
    margin: 10px 14px;
  }

  /* MAIN CONTENT */
  .main-content {
    flex: 1;
    background: var(--bg);
    padding: 32px;
  }

  .placeholder {
    color: #bbb;
    font-size: 1rem;
    text-align: center;
    margin-top: 80px;
    font-weight: 600;
  }
</style>
</head>
<body>
   

<!-- TOP NAVBAR -->
<nav class="navbar">
  <button class="menu-toggle" id="menuToggle" title="Toggle Menu">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>

  <span class="navbar-brand">Smart Clinic</span>

  <div class="navbar-search">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" placeholder="Search here…">
  </div>

  <div class="navbar-actions">
    <button class="nav-icon-btn" title="Profile">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
    </button>
    <button class="nav-icon-btn" title="Messages">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </button>
  </div>
</nav>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDE PANEL -->
  <aside class="side-panel" id="sidePanel">
    <div class="panel-header">
      <h2>Side Panel</h2>
      <button class="panel-close" id="panelClose">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="panel-section-label">Management</div>

    <a class="panel-item active" href="{% url 'client_home'  %}">
      <div class="panel-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <span class="panel-item-name">Reception</span>
      <span class="badge">2</span>
    </a>

    <a class="panel-item" href="#">
      <div class="panel-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </div>
      <span class="panel-item-name">Events</span>
    </a>

    <a class="panel-item" href="#">
      <div class="panel-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
        </svg>
      </div>
      <span class="panel-item-name">Photos</span>
    </a>

    <div class="divider"></div>
    <div class="panel-section-label">Pages</div>

    <a class="panel-item" href="#">
      <div class="panel-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
      </div>
      <span class="panel-item-name">Pages Feed</span>
      <span class="badge">2</span>
    </a>

    <a class="panel-item" href="#">
      <div class="panel-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/>
        </svg>
      </div>
      <span class="panel-item-name">Like Pages</span>
      <span class="badge">20+</span>
    </a>

    <div class="divider"></div>
    <div class="panel-section-label">Doctors</div>

    <a class="panel-item" href="{% url 'doctor_page'%}">
      <div class="panel-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </div>
      <span class="panel-item-name">Doctor Qualifications</span>
    </a>

    <a class="panel-item" href="#">
      <div class="panel-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
      </div>
      <span class="panel-item-name">Saved</span>
    </a>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <p class="placeholder">← Toggle the side panel using the ☰ menu button</p>
     {% block content %}{% endblock content %}
  </main>
</div>

<script>
  const toggle = document.getElementById('menuToggle');
  const panel = document.getElementById('sidePanel');
  const close = document.getElementById('panelClose');

  toggle.addEventListener('click', () => {
    panel.classList.toggle('hidden');
  });

  close.addEventListener('click', () => {
    panel.classList.add('hidden');
  });
</script>
</body>
</html>
